<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث سجلات مكتب الصفوة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232738;
    --border: #2e3347;
    --accent: #4f8ef7;
    --accent2: #7c6af7;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --success: #3ecf8e;
    --warning: #f7c94f;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--surface) 0%, #1e2235 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .header p {
    color: var(--text2);
    font-size: 13px;
  }

  /* Search area */
  .search-wrap {
    padding: 20px 16px 0;
    max-width: 680px;
    margin: 0 auto;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 16px;
    gap: 10px;
    transition: border-color 0.2s;
  }

  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
  }

  .search-icon {
    color: var(--text2);
    font-size: 18px;
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    padding: 14px 0;
    direction: rtl;
  }

  .search-input::placeholder { color: var(--text2); }

  .clear-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    border-radius: 50%;
    transition: all 0.15s;
    display: none;
  }
  .clear-btn.show { display: block; }
  .clear-btn:hover { color: var(--text); background: var(--surface2); }

  /* Stats bar */
  .stats-bar {
    max-width: 680px;
    margin: 10px auto 0;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
  }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
  }

  .count-badge span {
    color: var(--accent);
    font-weight: 600;
  }

  /* Fuzzy indicator */
  .fuzzy-tag {
    background: rgba(124,106,247,0.15);
    color: var(--accent2);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
  }

  /* Results */
  .results {
    max-width: 680px;
    margin: 12px auto 40px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.18s;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(-2px);
  }

  .card.fuzzy {
    border-color: rgba(124,106,247,0.35);
  }

  .card-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .card-body { flex: 1; min-width: 0; }

  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
  }

  .pill-table {
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.25);
  }

  .pill-id {
    background: rgba(62,207,142,0.1);
    color: var(--success);
    border: 1px solid rgba(62,207,142,0.2);
    font-family: monospace;
    letter-spacing: 0.3px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .pill-id:active {
    background: rgba(62,207,142,0.3);
    transform: scale(0.96);
  }
  .pill-id.copied {
    background: rgba(62,207,142,0.35);
    border-color: var(--success);
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--success);
    color: #0f1117;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 30px;
    opacity: 0;
    transition: all 0.25s;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .pill-area {
    background: rgba(247,201,79,0.1);
    color: var(--warning);
    border: 1px solid rgba(247,201,79,0.2);
  }

  .card-score {
    flex-shrink: 0;
  }

  .score-ring {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--text2);
  }

  .score-ring.exact {
    border-color: var(--success);
    color: var(--success);
  }

  .score-ring.close {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Empty / placeholder */
  .placeholder {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }

  .placeholder-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .placeholder h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .placeholder p { font-size: 13px; line-height: 1.6; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .no-results-icon { font-size: 40px; margin-bottom: 10px; }
  .no-results h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }
  .no-results p { font-size: 13px; }

  /* Highlight matched text */
  mark {
    background: rgba(79,142,247,0.25);
    color: var(--accent);
    border-radius: 3px;
    padding: 0 2px;
  }

  .more-hint {
    text-align: center;
    color: var(--text2);
    font-size: 12px;
    padding: 8px;
  }
</style>
</head>

<div class="header">

</div>

<div class="toast" id="toast">✓ تم النسخ!</div>

function copyId(el, id) {
  navigator.clipboard.writeText(id).then(() => {
    el.classList.add('copied');
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      el.classList.remove('copied');
    }, 1500);
  });
}

// ======= Arabic normalization =======
function normalizeArabic(s) {
  if (!s) return '';
  return s
    .replace(/[أإآا]/g, 'ا')
    .replace(/[ةه]/g, 'ه')
    .replace(/[يى]/g, 'ي')
    .replace(/ؤ/g, 'و')
    .replace(/ئ/g, 'ي')
    .replace(/[\u064B-\u065F]/g, '')  // diacritics
    .replace(/ال/g, '')                 // definite article
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

// ======= Fuzzy matching (Levenshtein distance) =======
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({length: m+1}, (_, i) => [i]);
  for (let j = 1; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1];
      else dp[i][j] = 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

// ======= Score a record against query =======
function scoreRecord(record, query, normQuery) {
  const normName = normalizeArabic(record.name);
  const normId   = record.national_id;
  const normTable = record.table;

  // Exact ID match → top priority
  if (normId.includes(query.replace(/\s/g,''))) {
    return { score: 100, type: 'exact' };
  }

  // Exact table match
  const tableClean = query.replace(/[\s\-]/g,'');
  const recTableClean = normTable.replace(/[\s\-]/g,'');
  if (recTableClean === tableClean || normTable === query.trim()) {
    return { score: 95, type: 'exact' };
  }

  // Name: exact contains
  if (normName.includes(normQuery)) {
    return { score: 90, type: 'exact' };
  }

  // Name: starts with any word match
  const queryWords = normQuery.split(' ').filter(Boolean);
  const nameWords  = normName.split(' ').filter(Boolean);

  let wordMatchCount = 0;
  for (const qw of queryWords) {
    for (const nw of nameWords) {
      if (nw.includes(qw) || qw.includes(nw)) { wordMatchCount++; break; }
    }
  }
  if (wordMatchCount === queryWords.length && queryWords.length > 0) {
    return { score: 82 - (queryWords.length - wordMatchCount) * 5, type: 'exact' };
  }
  if (wordMatchCount > 0) {
    return { score: 60 + wordMatchCount * 10, type: 'close' };
  }

  // Fuzzy: compare whole name
  if (normQuery.length >= 3 && normName.length > 0) {
    // Check each word in name against query words
    let bestWordScore = 0;
    for (const qw of queryWords) {
      if (qw.length < 2) continue;
      for (const nw of nameWords) {
        if (nw.length < 2) continue;
        const dist = levenshtein(qw, nw);
        const maxLen = Math.max(qw.length, nw.length);
        const sim = 1 - dist / maxLen;
        if (sim > bestWordScore) bestWordScore = sim;
      }
    }
    if (bestWordScore >= 0.65) {
      return { score: Math.round(bestWordScore * 55), type: 'fuzzy' };
    }
  }

  return null;
}

// ======= Highlight helper =======
function highlight(text, query) {
  if (!query) return text;
  const words = query.trim().split(/\s+/).filter(Boolean);
  let result = text;
  for (const w of words) {
    if (w.length < 2) continue;
    const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
  }
  return result;
}

// ======= Get initials for avatar =======
function getInitials(name) {
  const parts = name.trim().split(' ');
  return parts[0] ? parts[0][0] : '؟';
}

// ======= Render results =======
const MAX_SHOW = 60;

function render(results, query, isFuzzy) {
  const container = document.getElementById('results');
  const countEl   = document.getElementById('countNum');
  const fuzzyTag  = document.getElementById('fuzzyTag');

  countEl.textContent = results.length;
  fuzzyTag.style.display = isFuzzy ? 'inline-block' : 'none';

  if (results.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">😕</div>
        <h3>لا توجد نتائج</h3>
        <p>جرب كتابة الاسم بشكل مختلف أو تأكد من الرقم الوطني</p>
      </div>`;
    return;
  }

  const shown = results.slice(0, MAX_SHOW);
  const html = shown.map(({record, score, type}) => {
    const initials = getInitials(record.name);
    const highlightedName = highlight(record.name, query);
    const scoreClass = type === 'exact' ? 'exact' : type === 'close' ? 'close' : '';
    const scoreText  = type === 'exact' ? '✓' : `${score}%`;

    return `
    <div class="card ${type === 'fuzzy' ? 'fuzzy' : ''}">
      <div class="card-avatar">${initials}</div>
      <div class="card-body">
        <div class="card-name">${highlightedName}</div>
        <div class="card-meta">
          <span class="meta-pill pill-table">📋 جدول ${record.table}</span>
          <span class="meta-pill pill-id" onclick="copyId(this,'${record.national_id}')" title="اضغط للنسخ">📋 ${record.national_id}</span>
          <span class="meta-pill pill-area">📍 ${record.area}</span>
        </div>
      </div>
      <div class="card-score">
        <div class="score-ring ${scoreClass}">${scoreText}</div>
      </div>
    </div>`;
  }).join('');

  const extra = results.length > MAX_SHOW
    ? `<div class="more-hint">يعرض ${MAX_SHOW} من أصل ${results.length} — دقق البحث للحصول على نتائج أقل</div>`
    : '';

  container.innerHTML = html + extra;
}

// ======= Main search =======
let timer = null;

function doSearch(raw) {
  const query = raw.trim();
  document.getElementById('clearBtn').className = 'clear-btn' + (query ? ' show' : '');

  if (!query) {
    document.getElementById('countNum').textContent = '—';
    document.getElementById('fuzzyTag').style.display = 'none';
    document.getElementById('results').innerHTML = `
      <div class="placeholder">
        <div class="placeholder-icon">📋</div>
        <h3>ابدأ البحث</h3>
        <p>اكتب الاسم أو جزء منه أو الرقم الوطني<br>أو رقم الجدول للعثور على المعاملة</p>
      </div>`;
    return;
  }

  const normQuery = normalizeArabic(query);

  // Score all records
  const scored = [];
  for (const record of DATA) {
    const result = scoreRecord(record, query, normQuery);
    if (result && result.score > 0) {
      scored.push({ record, ...result });
    }
  }

  // Sort by score desc
  scored.sort((a, b) => b.score - a.score);

  // Determine if fuzzy was needed
  const hasFuzzy = scored.some(r => r.type === 'fuzzy');
  const hasExact  = scored.some(r => r.type === 'exact' || r.type === 'close');

  render(scored, query, hasFuzzy && !hasExact);
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(timer);
  timer = setTimeout(() => doSearch(e.target.value), 120);
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
  document.getElementById('searchInput').focus();
}
</script>
